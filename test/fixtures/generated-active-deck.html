<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Generated Active Deck</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
      }

      .deck {
        position: fixed;
        inset: 0;
      }

      .slide {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        opacity: 0;
        visibility: hidden;
      }

      .slide.active {
        opacity: 1;
        visibility: visible;
      }

      .nav {
        position: fixed;
        bottom: 20px;
        right: 20px;
      }
    </style>
  </head>
  <body>
    <div class="deck" id="deck">
      <section class="slide active" data-notes="First note">
        <h1>First generated slide</h1>
      </section>
      <section class="slide" data-notes="Second note">
        <h1>Second generated slide</h1>
      </section>
      <section class="slide" data-notes="Third note">
        <h1>Third generated slide</h1>
      </section>
    </div>

    <div class="nav">
      <button id="prev">Previous</button>
      <button id="next">Next</button>
    </div>

    <script>
      const slides = Array.from(document.querySelectorAll(".slide"));
      let index = 0;
      function render() {
        slides.forEach((slide, slideIndex) => {
          slide.classList.toggle("active", slideIndex === index);
        });
      }
      document.querySelector("#next").addEventListener("click", () => {
        index = Math.min(index + 1, slides.length - 1);
        render();
      });
    </script>
  </body>
</html>
