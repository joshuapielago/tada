name: Unsigned Beta Release

on:
  push:
    tags:
      - "v*-beta.*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing beta tag to publish, for example v0.1.1-beta.0"
        required: true
        type: string

permissions:
  contents: write

env:
  CSC_IDENTITY_AUTO_DISCOVERY: false
  RELEASE_TAG: ${{ inputs.tag_name || github.ref_name }}

jobs:
  build-mac:
    name: Build unsigned macOS beta
    runs-on: macos-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name || github.ref }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build unsigned macOS artifacts
        run: npm run dist:mac -- -c.mac.identity=null

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tada-macos-beta
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap
            dist/latest*.yml
          if-no-files-found: error

  build-windows:
    name: Build unsigned Windows beta
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name || github.ref }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build unsigned Windows artifacts
        run: npm run dist:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tada-windows-beta
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/latest*.yml
          if-no-files-found: error

  publish:
    name: Publish unsigned beta GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-mac
      - build-windows
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: TaDa! ${{ env.RELEASE_TAG }}
          prerelease: true
          generate_release_notes: true
          files: |
            release-artifacts/*.dmg
            release-artifacts/*.zip
            release-artifacts/*.exe
            release-artifacts/*.blockmap
            release-artifacts/latest*.yml
