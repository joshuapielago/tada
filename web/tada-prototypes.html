  var P = ["<!doctype html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>TaDa! — Beautiful decks, live<\/title>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin>\n<link href=\"https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap\" rel=\"stylesheet\">\n<style>/* TaDa! brand tokens — shared across every homepage prototype.\n * Pulled from the product icon + product deck: plum night, paper, cream,\n * coral, mint, sunny yellow, violet. Light, friendly, human, rounded. */\n:root {\n  --night: #170d24;\n  --plum: #23162e;\n  --ink: #23162e;\n  --ink-soft: #766b7c;\n  --paper: #fffdfd;\n  --cream: #fff7df;\n  --coral: #ff4f68;\n  --coral-deep: #df3651;\n  --mint: #32c6b1;\n  --yellow: #ffd24f;\n  --violet: #7c4dff;\n  --sky: #3867e8;\n  --line: #eadbea;\n  --line-soft: #f1eef0;\n\n  --font-display: \"Fredoka\", \"Baloo 2\", \"Arial Rounded MT Bold\", \"Avenir Next\",\n    ui-rounded, \"Segoe UI\", system-ui, sans-serif;\n  --font-ui: \"Inter\", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,\n    \"Segoe UI\", sans-serif;\n\n  --shadow-sm: 0 4px 14px rgb(35 22 46 / 8%);\n  --shadow-md: 0 14px 40px rgb(35 22 46 / 12%);\n  --shadow-lg: 0 30px 80px rgb(35 22 46 / 18%);\n  --r-sm: 12px;\n  --r-md: 18px;\n  --r-lg: 28px;\n  --r-pill: 999px;\n}\n\n* { box-sizing: border-box; }\n\nhtml { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }\n\nbody {\n  margin: 0;\n  font-family: var(--font-ui);\n  color: var(--ink);\n  background: var(--paper);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nimg { max-width: 100%; display: block; }\na { color: inherit; text-decoration: none; }\n\n/* The signature TaDa! upload button — big, friendly, unmissable. */\n.tada-upload {\n  display: inline-flex;\n  align-items: center;\n  gap: 10px;\n  padding: 15px 26px;\n  border: 0;\n  border-radius: var(--r-pill);\n  background: linear-gradient(135deg, var(--coral), var(--coral-deep));\n  color: var(--paper);\n  font-family: var(--font-display);\n  font-size: 1.05rem;\n  font-weight: 600;\n  cursor: pointer;\n  box-shadow: 0 12px 30px rgb(255 79 104 / 34%);\n  transition: transform .18s ease, box-shadow .18s ease;\n}\n.tada-upload:hover { transform: translateY(-2px); box-shadow: 0 18px 40px rgb(255 79 104 / 42%); }\n.tada-upload:active { transform: translateY(0); }\n.tada-upload .wand { font-size: 1.15em; }\n\n.tada-ghost {\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n  padding: 14px 22px;\n  border: 1.5px solid var(--line);\n  border-radius: var(--r-pill);\n  background: var(--paper);\n  color: var(--ink);\n  font-family: var(--font-display);\n  font-weight: 500;\n  cursor: pointer;\n  transition: border-color .18s ease, transform .18s ease;\n}\n.tada-ghost:hover { border-color: var(--coral); transform: translateY(-2px); }\n\n/* Brand wordmark lockup */\n.tada-wordmark {\n  display: inline-flex;\n  align-items: center;\n  gap: 10px;\n  font-family: var(--font-display);\n  font-weight: 600;\n  font-size: 1.4rem;\n  letter-spacing: -.01em;\n}\n.tada-logo {\n  display: grid;\n  place-items: center;\n  width: 38px;\n  height: 38px;\n  border-radius: 11px;\n  background: linear-gradient(135deg, #2b1b46, #170d24);\n  color: var(--yellow);\n  font-size: 1.1rem;\n}\n<\/style>\n<style>/* Deck slide + gallery card styling.\n * .deck-slide is a 16:9 container-query context; every measurement inside a\n * slide is in cqw, so the same markup renders perfectly as a tiny thumbnail\n * or a huge hero. Shared by all prototypes. */\n\n.deck-slide {\n  container-type: inline-size;\n  position: relative;\n  aspect-ratio: 16 / 9;\n  width: 100%;\n  overflow: hidden;\n  border-radius: var(--r-md);\n  background: var(--paper);\n}\n\n.ds {\n  position: absolute;\n  inset: 0;\n  display: flex;\n  flex-direction: column;\n  padding: 7cqw;\n  overflow: hidden;\n  font-family: var(--font-display);\n  isolation: isolate;\n}\n.ds-grow { flex: 1; }\n.ds-dot { position: absolute; border-radius: 50%; opacity: .9; z-index: 0; }\n.ds > * { position: relative; z-index: 1; }\n\n.ds-eyebrow {\n  font-family: var(--font-ui);\n  font-size: 3cqw;\n  font-weight: 800;\n  letter-spacing: .16em;\n  text-transform: uppercase;\n}\n\n.ds-title {\n  margin: 1.5cqw 0 0;\n  font-size: 9.5cqw;\n  font-weight: 700;\n  line-height: .98;\n  letter-spacing: -.02em;\n}\n.ds-title.sm { font-size: 7.5cqw; }\n.ds-title.xs { font-size: 5.5cqw; }\n.ds-sub {\n  margin: 2.5cqw 0 0;\n  font-family: var(--font-ui);\n  font-size: 3.6cqw;\n  font-weight: 600;\n  color: var(--soft);\n  line-height: 1.25;\n}\n\n.ds-foot {\n  display: flex;\n  justify-content: space-between;\n  align-items: flex-end;\n  margin-top: auto;\n  padding-top: 3cqw;\n  font-family: var(--font-ui);\n  font-size: 3cqw;\n}\n.ds-by { font-weight: 700; color: var(--soft); }\n.ds-pg { font-weight: 700; color: var(--accent); }\n\n/* stat */\n.ds-statwrap { margin: auto 0; }\n.ds-stat { font-size: 26cqw; line-height: .9; font-weight: 700; letter-spacing: -.03em; }\n.ds-statlabel {\n  margin-top: 1cqw;\n  max-width: 70%;\n  font-family: var(--font-ui);\n  font-size: 3.4cqw;\n  font-weight: 600;\n  color: var(--soft);\n  line-height: 1.2;\n}\n\n/* bars */\n.ds-bars {\n  display: flex;\n  align-items: flex-end;\n  gap: 2.2cqw;\n  height: 26cqw;\n  margin-top: 3cqw;\n}\n.ds-bars span { flex: 1; border-radius: 1.4cqw 1.4cqw 0 0; min-height: 4%; }\n.ds-legend {\n  display: flex;\n  align-items: center;\n  gap: 1.6cqw;\n  margin-top: 3cqw;\n  font-family: var(--font-ui);\n  font-size: 2.7cqw;\n  font-weight: 600;\n  color: var(--soft);\n}\n.ds-legend span { width: 3cqw; height: 3cqw; border-radius: 50%; }\n.ds-legend span:nth-of-type(2) { margin-left: 3cqw; }\n\n/* quote */\n.ds-mark { font-size: 22cqw; line-height: .6; height: 9cqw; }\n.ds-quote {\n  margin: 1cqw 0 0;\n  font-size: 7cqw;\n  font-weight: 600;\n  line-height: 1.1;\n  letter-spacing: -.01em;\n}\n\n/* grid */\n.ds-grid {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 2.4cqw;\n  flex: 1;\n  margin-top: 3cqw;\n}\n.ds-grid span {\n  display: grid;\n  place-items: center;\n  border-radius: 2.6cqw;\n  font-size: 8cqw;\n  font-weight: 700;\n  color: var(--paper);\n}\n.ds-light .ds-grid span:nth-child(2),\n.ds-light .ds-grid span:nth-child(4) { color: var(--ink); }\n.ds-grid span:last-child { border: .8cqw solid currentColor; color: var(--accent); }\n\n/* agenda */\n.ds-agenda { list-style: none; margin: 3cqw 0 0; padding: 0; flex: 1; }\n.ds-agenda li {\n  display: flex;\n  align-items: center;\n  gap: 3cqw;\n  padding: 2.1cqw 0;\n  border-top: .4cqw solid color-mix(in srgb, currentColor 12%, transparent);\n  font-family: var(--font-ui);\n  font-size: 4cqw;\n  font-weight: 600;\n}\n.ds-agenda li:last-child { border-bottom: .4cqw solid color-mix(in srgb, currentColor 12%, transparent); }\n.ds-agenda b { font-family: var(--font-display); font-size: 4.6cqw; }\n\n/* photo */\n.ds-photo { position: absolute; inset: 0; z-index: 0; }\n.ds-shape {\n  position: absolute;\n  right: -8cqw;\n  bottom: -8cqw;\n  width: 38cqw;\n  height: 38cqw;\n  border-radius: 50%;\n  opacity: .5;\n  mix-blend-mode: screen;\n}\n.ds-cap {\n  position: absolute;\n  left: 7cqw;\n  right: 7cqw;\n  bottom: 7cqw;\n  z-index: 2;\n  color: var(--paper);\n  text-shadow: 0 2cqw 6cqw rgb(0 0 0 / 35%);\n}\n.ds-cap .ds-eyebrow { color: var(--paper) !important; opacity: .92; }\n\n/* ---- gallery card wrapper ------------------------------------------- */\n.deck-card {\n  display: block;\n  border-radius: var(--r-md);\n  background: var(--paper);\n  cursor: pointer;\n  transition: transform .22s cubic-bezier(.2,.7,.2,1), box-shadow .22s ease;\n}\n.deck-card .deck-slide {\n  box-shadow: var(--shadow-md);\n  transition: box-shadow .22s ease;\n}\n.deck-card:hover { transform: translateY(-6px); }\n.deck-card:hover .deck-slide { box-shadow: var(--shadow-lg); }\n\n.deck-meta {\n  display: flex;\n  align-items: center;\n  gap: 10px;\n  padding: 12px 4px 2px;\n}\n.deck-avatar {\n  display: grid;\n  place-items: center;\n  width: 30px;\n  height: 30px;\n  flex: 0 0 auto;\n  border-radius: 50%;\n  color: var(--paper);\n  font-family: var(--font-display);\n  font-size: .72rem;\n  font-weight: 600;\n}\n.deck-info { display: flex; flex-direction: column; min-width: 0; line-height: 1.2; }\n.deck-info b { font-size: .9rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }\n.deck-info i { font-style: normal; font-size: .78rem; color: var(--ink-soft); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }\n.deck-likes { margin-left: auto; flex: 0 0 auto; font-size: .8rem; font-weight: 600; color: var(--ink-soft); }\n<\/style>\n<style>\n  body { background: radial-gradient(120% 80% at 80% -10%, #fff3ef 0%, transparent 55%), var(--paper); }\n  .nav {\n    position: sticky; top: 0; z-index: 50; display: flex; align-items: center; gap: 18px;\n    padding: 16px clamp(20px, 5vw, 56px); backdrop-filter: blur(12px);\n    background: color-mix(in srgb, var(--paper) 78%, transparent); border-bottom: 1px solid var(--line-soft);\n  }\n  .nav .links { display: flex; gap: 22px; margin-left: 20px; }\n  .nav .links a { font-weight: 600; font-size: .92rem; color: var(--ink-soft); }\n  .nav .links a:hover { color: var(--ink); }\n  .nav .right { margin-left: auto; display: flex; gap: 12px; align-items: center; }\n  @media (max-width: 720px) { .nav .links { display: none; } }\n\n  .hero { display: grid; grid-template-columns: 1.05fr 1fr; gap: clamp(24px, 5vw, 70px);\n    align-items: center; padding: clamp(36px, 6vw, 80px) clamp(20px, 5vw, 56px) clamp(20px, 4vw, 40px); }\n  .hero h1 { font-family: var(--font-display); font-weight: 700; letter-spacing: -.03em;\n    font-size: clamp(2.6rem, 6vw, 4.6rem); line-height: .98; margin: 0; }\n  .hero h1 .pop { background: linear-gradient(120deg, var(--coral), var(--violet)); -webkit-background-clip: text; background-clip: text; color: transparent; }\n  .hero p { font-size: clamp(1.05rem, 1.5vw, 1.3rem); color: var(--ink-soft); max-width: 42ch; margin: 22px 0 28px; line-height: 1.45; }\n  .hero .cta { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }\n  .hero .meta { margin-top: 22px; font-size: .9rem; color: var(--ink-soft); }\n  .hero .meta b { color: var(--ink); }\n\n  .stage-art { position: relative; min-height: 360px; }\n  .stage-art .big { position: relative; z-index: 2; transform: rotate(-3deg); }\n  .stage-art .float {\n    position: absolute; width: 42%; z-index: 3; box-shadow: var(--shadow-lg); border-radius: var(--r-md);\n    animation: bob 6s ease-in-out infinite;\n  }\n  .stage-art .f1 { right: -6%; top: -8%; transform: rotate(6deg); }\n  .stage-art .f2 { left: -8%; bottom: -6%; transform: rotate(-7deg); animation-delay: -2s; }\n  @keyframes bob { 50% { transform: translateY(-12px) rotate(var(--r, 0deg)); } }\n  .stage-art .f1 { --r: 6deg; }\n  .stage-art .f2 { --r: -7deg; }\n  @media (max-width: 860px) { .hero { grid-template-columns: 1fr; } .stage-art { display: none; } }\n\n  .section-head { display: flex; align-items: baseline; gap: 14px; padding: 0 clamp(20px, 5vw, 56px); margin-top: 30px; }\n  .section-head h2 { font-family: var(--font-display); font-weight: 600; font-size: 1.5rem; margin: 0; }\n  .section-head span { color: var(--ink-soft); font-size: .92rem; }\n\n  .chips { display: flex; gap: 9px; flex-wrap: wrap; padding: 16px clamp(20px, 5vw, 56px) 4px; }\n  .chip { padding: 8px 16px; border-radius: var(--r-pill); border: 1.5px solid var(--line);\n    background: var(--paper); font-weight: 600; font-size: .86rem; cursor: pointer; color: var(--ink-soft); transition: all .14s; }\n  .chip:hover { border-color: var(--coral); color: var(--ink); }\n  .chip.active { background: var(--night); border-color: var(--night); color: var(--paper); }\n\n  .wall { columns: 4 250px; column-gap: 22px; padding: 20px clamp(20px, 5vw, 56px) 70px; }\n  .wall .deck-card { break-inside: avoid; margin-bottom: 26px; }\n\n  footer { padding: 40px clamp(20px, 5vw, 56px) 60px; border-top: 1px solid var(--line); color: var(--ink-soft); font-size: .9rem;\n    display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }\n  footer .tada-wordmark { font-size: 1.1rem; }\n  footer .spacer { margin-left: auto; }\n<\/style>\n<\/head>\n<body>\n  <nav class=\"nav\">\n    <div class=\"tada-wordmark\"><span class=\"tada-logo\">✦<\/span> TaDa!<\/div>\n    <div class=\"links\"><a href=\"#\">Explore<\/a><a href=\"#\">Collections<\/a><a href=\"#\">Pin a deck<\/a><\/div>\n    <div class=\"right\"><a class=\"tada-ghost\" href=\"#\">Sign in<\/a><button class=\"tada-upload\"><span class=\"wand\">✦<\/span> Upload deck<\/button><\/div>\n  <\/nav>\n\n  <header class=\"hero\">\n    <div>\n      <h1>Where the world's <span class=\"pop\">most beautiful decks<\/span> live.<\/h1>\n      <p>TaDa! turns any HTML file into a gorgeous, shareable presentation — and gathers the best ones, in one place, for inspiration.<\/p>\n      <div class=\"cta\">\n        <button class=\"tada-upload\"><span class=\"wand\">✦<\/span> Upload your deck<\/button>\n        <a class=\"tada-ghost\" href=\"#\">Browse the gallery<\/a>\n      <\/div>\n      <p class=\"meta\"><b>12,400+<\/b> decks pinned · <b>free<\/b> to share · drop an <b>.html<\/b> and you're live<\/p>\n    <\/div>\n    <div class=\"stage-art\" id=\"art\"><\/div>\n  <\/header>\n\n  <div class=\"section-head\"><h2>Trending today<\/h2><span>Hand-picked, refreshed every morning<\/span><\/div>\n  <div class=\"chips\" id=\"chips\"><\/div>\n  <div class=\"wall\" id=\"wall\"><\/div>\n\n  <footer>\n    <div class=\"tada-wordmark\"><span class=\"tada-logo\">✦<\/span> TaDa!<\/div>\n    <span class=\"spacer\"><\/span>\n    <span>Drop HTML. Cue the show. · praktikal.ai/tada<\/span>\n  <\/footer>\n\n<script>/* TaDa! homepage prototypes — shared deck gallery data + renderer.\n * Every \"deck\" is drawn as a real 16:9 HTML slide so the wall looks like\n * an actual gallery of beautiful decks. Sizing uses container-query units\n * (cqw) so a thumbnail stays crisp at any size. No build step, no deps. */\n(function (global) {\n  \"use strict\";\n\n  function esc(s) {\n    return String(s).replace(/[&<>\"]/g, function (c) {\n      return { \"&\": \"&amp;\", \"<\": \"&lt;\", \">\": \"&gt;\", '\"': \"&quot;\" }[c];\n    });\n  }\n\n  /* Confetti dots scattered for the playful, human feel. */\n  function dots(colors, n) {\n    var out = \"\";\n    for (var i = 0; i < n; i++) {\n      var c = colors[i % colors.length];\n      var top = (7 + ((i * 37) % 80)).toFixed(1);\n      var left = (6 + ((i * 53) % 86)).toFixed(1);\n      var size = (1.4 + ((i * 7) % 22) / 10).toFixed(1);\n      out +=\n        '<span class=\"ds-dot\" style=\"top:' + top + \"%;left:\" + left +\n        \"%;width:\" + size + \"cqw;height:\" + size + \"cqw;background:\" + c + '\"><\/span>';\n    }\n    return out;\n  }\n\n  function bars(values, accent, accent2) {\n    var out = '<div class=\"ds-bars\">';\n    for (var i = 0; i < values.length; i++) {\n      var col = i === values.length - 1 ? accent : accent2;\n      out +=\n        '<span style=\"height:' + values[i] + \"%;background:\" + col + '\"><\/span>';\n    }\n    return out + \"<\/div>\";\n  }\n\n  /* ---- slide templates, keyed by deck.kind ---------------------------- */\n  var templates = {\n    cover: function (d) {\n      var t = d.theme;\n      return (\n        dots([t.accent, t.accent2, t.accent3], 7) +\n        '<div class=\"ds-eyebrow\" style=\"color:' + t.accent + '\">' + esc(d.eyebrow || d.category) + \"<\/div>\" +\n        '<div class=\"ds-grow\"><\/div>' +\n        '<h3 class=\"ds-title\">' + esc(d.title) + \"<\/h3>\" +\n        (d.sub ? '<p class=\"ds-sub\">' + esc(d.sub) + \"<\/p>\" : \"\") link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin>\n<link href=\"https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap\" rel=\"stylesheet\">\n<style>/* TaDa! brand tokens — shared across every homepage prototype.\n * Pulled from the product icon + product deck: plum night, paper, cream,\n * coral, mint, sunny yellow, violet. Light, friendly, human, rounded. */\n:root {\n  --night: #170d24;\n  --plum: #23162e;\n  --ink: #23162e;\n  --ink-soft: #766b7c;\n  --paper: #fffdfd;\n  --cream: #fff7df;\n  --coral: #ff4f68;\n  --coral-deep: #df3651;\n  --mint: #32c6b1;\n  --yellow: #ffd24f;\n  --violet: #7c4dff;\n  --sky: #3867e8;\n  --line: #eadbea;\n  --line-soft: #f1eef0;\n\n  --font-display: \"Fredoka\", \"Baloo 2\", \"Arial Rounded MT Bold\", \"Avenir Next\",\n    ui-rounded, \"Segoe UI\", system-ui, sans-serif;\n  --font-ui: \"Inter\", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,\n    \"Segoe UI\", sans-serif;\n\n  --shadow-sm: 0 4px 14px rgb(35 22 46 / 8%);\n  --shadow-md: 0 14px 40px rgb(35 22 46 / 12%);\n  --shadow-lg: 0 30px 80px rgb(35 22 46 / 18%);\n  --r-sm: 12px;\n  --r-md: 18px;\n  --r-lg: 28px;\n  --r-pill: 999px;\n}\n\n* { box-sizing: border-box; }\n\nhtml { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }\n\nbody {\n  margin: 0;\n  font-family: var(--font-ui);\n  color: var(--ink);\n  background: var(--paper);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nimg { max-width: 100%; display: block; }\na { color: inherit; text-decoration: none; }\n\n/* The signature TaDa! upload button — big, friendly, unmissable. */\n.tada-upload {\n  display: inline-flex;\n  align-items: center;\n  gap: 10px;\n  padding: 15px 26px;\n  border: 0;\n  border-radius: var(--r-pill);\n  background: linear-gradient(135deg, var(--coral), var(--coral-deep));\n  color: var(--paper);\n  font-family: var(--font-display);\n  font-size: 1.05rem;\n  font-weight: 600;\n  cursor: pointer;\n  box-shadow: 0 12px 30px rgb(255 79 104 / 34%);\n  transition: transform .18s ease, box-shadow .18s ease;\n}\n.tada-upload:hover { transform: translateY(-2px); box-shadow: 0 18px 40px rgb(255 79 104 / 42%); }\n.tada-upload:active { transform: translateY(0); }\n.tada-upload .wand { font-size: 1.15em; }\n\n.tada-ghost {\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n  padding: 14px 22px;\n  border: 1.5px solid var(--line);\n  border-radius: var(--r-pill);\n  background: var(--paper);\n  color: var(--ink);\n  font-family: var(--font-display);\n  font-weight: 500;\n  cursor: pointer;\n  transition: border-color .18s ease, transform .18s ease;\n}\n.tada-ghost:hover { border-color: var(--coral); transform: translateY(-2px); }\n\n/* Brand wordmark lockup */\n.tada-wordmark {\n  display: inline-flex;\n  align-items: center;\n  gap: 10px;\n  font-family: var(--font-display);\n  font-weight: 600;\n  font-size: 1.4rem;\n  letter-spacing: -.01em;\n}\n.tada-logo {\n  display: grid;\n  place-items: center;\n  width: 38px;\n  height: 38px;\n  border-radius: 11px;\n  background: linear-gradient(135deg, #2b1b46, #170d24);\n  color: var(--yellow);\n  font-size: 1.1rem;\n}\n<\/style>\n<style>/* Deck slide + gallery card styling.\n * .deck-slide is a 16:9 container-query context; every measurement inside a\n * slide is in cqw, so the same markup renders perfectly as a tiny thumbnail\n * or a huge hero. Shared by all prototypes. */\n\n.deck-slide {\n  container-type: inline-size;\n  position: relative;\n  aspect-ratio: 16 / 9;\n  width: 100%;\n  overflow: hidden;\n  border-radius: var(--r-md);\n  background: var(--paper);\n}\n\n.ds {\n  position: absolute;\n  inset: 0;\n  display: flex;\n  flex-direction: column;\n  padding: 7cqw;\n  overflow: hidden;\n  font-family: var(--font-display);\n  isolation: isolate;\n}\n.ds-grow { flex: 1; }\n.ds-dot { position: absolute; border-radius: 50%; opacity: .9; z-index: 0; }\n.ds > * { position: relative; z-index: 1; }\n\n.ds-eyebrow {\n  font-family: var(--font-ui);\n  font-size: 3cqw;\n  font-weight: 800;\n  letter-spacing: .16em;\n  text-transform: uppercase;\n}\n\n.ds-title {\n  margin: 1.5cqw 0 0;\n  font-size: 9.5cqw;\n  font-weight: 700;\n  line-height: .98;\n  letter-spacing: -.02em;\n}\n.ds-title.sm { font-size: 7.5cqw; }\n.ds-title.xs { font-size: 5.5cqw; }\n.ds-sub {\n  margin: 2.5cqw 0 0;\n  font-family: var(--font-ui);\n  font-size: 3.6cqw;\n  font-weight: 600;\n  color: var(--soft);\n  line-height: 1.25;\n}\n\n.ds-foot {\n  display: flex;\n  justify-content: space-between;\n  align-items: flex-end;\n  margin-top: auto;\n  padding-top: 3cqw;\n  font-family: var(--font-ui);\n  font-size: 3cqw;\n}\n.ds-by { font-weight: 700; color: var(--soft); }\n.ds-pg { font-weight: 700; color: var(--accent); }\n\n/* stat */\n.ds-statwrap { margin: auto 0; }\n.ds-stat { font-size: 26cqw; line-height: .9; font-weight: 700; letter-spacing: -.03em; }\n.ds-statlabel {\n  margin-top: 1cqw;\n  max-width: 70%;\n  font-family: var(--font-ui);\n  font-size: 3.4cqw;\n  font-weight: 600;\n  color: var(--soft);\n  line-height: 1.2;\n}\n\n/* bars */\n.ds-bars {\n  display: flex;\n  align-items: flex-end;\n  gap: 2.2cqw;\n  height: 26cqw;\n  margin-top: 3cqw;\n}\n.ds-bars span { flex: 1; border-radius: 1.4cqw 1.4cqw 0 0; min-height: 4%; }\n.ds-legend {\n  display: flex;\n  align-items: center;\n  gap: 1.6cqw;\n  margin-top: 3cqw;\n  font-family: var(--font-ui);\n  font-size: 2.7cqw;\n  font-weight: 600;\n  color: var(--soft);\n}\n.ds-legend span { width: 3cqw; height: 3cqw; border-radius: 50%; }\n.ds-legend span:nth-of-type(2) { margin-left: 3cqw; }\n\n/* quote */\n.ds-mark { font-size: 22cqw; line-height: .6; height: 9cqw; }\n.ds-quote {\n  margin: 1cqw 0 0;\n  font-size: 7cqw;\n  font-weight: 600;\n  line-height: 1.1;\n  letter-spacing: -.01em;\n}\n\n/* grid */\n.ds-grid {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 2.4cqw;\n  flex: 1;\n  margin-top: 3cqw;\n}\n.ds-grid span {\n  display: grid;\n  place-items: center;\n  border-radius: 2.6cqw;\n  font-size: 8cqw;\n  font-weight: 700;\n  color: var(--paper);\n}\n.ds-light .ds-grid span:nth-child(2),\n.ds-light .ds-grid span:nth-child(4) { color: var(--ink); }\n.ds-grid span:last-child { border: .8cqw solid currentColor; color: var(--accent); }\n\n/* agenda */\n.ds-agenda { list-style: none; margin: 3cqw 0 0; padding: 0; flex: 1; }\n.ds-agenda li {\n  display: flex;\n  align-items: center;\n  gap: 3cqw;\n  padding: 2.1cqw 0;\n  border-top: .4cqw solid color-mix(in srgb, currentColor 12%, transparent);\n  font-family: var(--font-ui);\n  font-size: 4cqw;\n  font-weight: 600;\n}\n.ds-agenda li:last-child { border-bottom: .4cqw solid color-mix(in srgb, currentColor 12%, transparent); }\n.ds-agenda b { font-family: var(--font-display); font-size: 4.6cqw; }\n\n/* photo */\n.ds-photo { position: absolute; inset: 0; z-index: 0; }\n.ds-shape {\n  position: absolute;\n  right: -8cqw;\n  bottom: -8cqw;\n  width: 38cqw;\n  height: 38cqw;\n  border-radius: 50%;\n  opacity: .5;\n  mix-blend-mode: screen;\n}\n.ds-cap {\n  position: absolute;\n  left: 7cqw;\n  right: 7cqw;\n  bottom: 7cqw;\n  z-index: 2;\n  color: var(--paper);\n  text-shadow: 0 2cqw 6cqw rgb(0 0 0 / 35%);\n}\n.ds-cap .ds-eyebrow { color: var(--paper) !important; opacity: .92; }\n\n/* ---- gallery card wrapper ------------------------------------------- */\n.deck-card {\n  display: block;\n  border-radius: var(--r-md);\n  background: var(--paper);\n  cursor: pointer;\n  transition: transform .22s cubic-bezier(.2,.7,.2,1), box-shadow .22s ease;\n}\n.deck-card .deck-slide {\n  box-shadow: var(--shadow-md);\n  transition: box-shadow .22s ease;\n}\n.deck-card:hover { transform: translateY(-6px); }\n.deck-card:hover .deck-slide { box-shadow: var(--shadow-lg); }\n\n.deck-meta {\n  display: flex;\n  align-items: center;\n  gap: 10px;\n  padding: 12px 4px 2px;\n}\n.deck-avatar {\n  display: grid;\n  place-items: center;\n  width: 30px;\n  height: 30px;\n  flex: 0 0 auto;\n  border-radius: 50%;\n  color: var(--paper);\n  font-family: var(--font-display);\n  font-size: .72rem;\n  font-weight: 600;\n}\n.deck-info { display: flex; flex-direction: column; min-width: 0; line-height: 1.2; }\n.deck-info b { font-size: .9rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }\n.deck-info i { font-style: normal; font-size: .78rem; color: var(--ink-soft); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }\n.deck-likes { margin-left: auto; flex: 0 0 auto; font-size: .8rem; font-weight: 600; color: var(--ink-soft); }\n<\/style>\n<style>\n  body { min-height: 100vh; overflow-x: hidden;\n    background: radial-gradient(100% 70% at 50% -10%, #fff2ee 0, transparent 60%), var(--paper); }\n  .nav { display: flex; align-items: center; padding: 18px clamp(20px, 5vw, 56px); }\n  .nav .right { margin-left: auto; display: flex; gap: 12px; align-items: center; }\n  .nav .right a { font-weight: 600; color: var(--ink-soft); font-size: .92rem; }\n\n  .hero { display: grid; place-items: center; text-align: center; padding: clamp(20px, 4vw, 40px) 18px 30px; position: relative; }\n  .eyebrow { display: inline-flex; align-items: center; gap: 8px; padding: 7px 15px; border-radius: var(--r-pill);\n    background: #fff; border: 1.5px solid var(--line); font-weight: 600; font-size: .82rem; color: var(--coral-deep); box-shadow: var(--shadow-sm); }\n  .hero h1 { font-family: var(--font-display); font-weight: 700; letter-spacing: -.03em; margin: 22px 0 0;\n    font-size: clamp(2.5rem, 7vw, 5.2rem); line-height: .96; }\n  .hero h1 .tada { position: relative; background: linear-gradient(120deg, var(--coral), var(--violet) 60%, var(--mint));\n    -webkit-background-clip: text; background-clip: text; color: transparent; }\n  .hero p { font-size: clamp(1.05rem, 1.6vw, 1.35rem); color: var(--ink-soft); margin: 18px auto 0; max-width: 46ch; line-height: 1.45; }\n\n  /* the drop zone — the whole point */\n  .drop { position: relative; width: min(720px, 92vw); margin: 34px auto 0; padding: clamp(30px, 5vw, 54px);\n    border: 2.5px dashed color-mix(in srgb, var(--coral) 55%, var(--line)); border-radius: var(--r-lg);\n    background: color-mix(in srgb, var(--paper) 84%, var(--cream)); cursor: pointer;\n    transition: border-color .2s, background .2s, transform .2s; }\n  .drop:hover { transform: translateY(-3px); border-color: var(--coral); }\n  .drop.drag { border-color: var(--violet); border-style: solid; background: #fff;\n    transform: scale(1.015); box-shadow: var(--shadow-lg); }\n  .drop .wandbig { font-size: 2.6rem; }\n  .drop h2 { font-family: var(--font-display); font-weight: 600; font-size: clamp(1.3rem, 2.4vw, 1.8rem); margin: 12px 0 6px; }\n  .drop p { color: var(--ink-soft); margin: 0; }\n  .drop .row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 22px; }\n  .drop .or { color: var(--ink-soft); font-size: .85rem; margin-top: 16px; }\n  .urlbar { display: flex; gap: 8px; max-width: 460px; margin: 10px auto 0; }\n  .urlbar input { flex: 1; padding: 13px 16px; border: 1.5px solid var(--line); border-radius: var(--r-pill);\n    font: inherit; outline: none; background: #fff; }\n  .urlbar input:focus { border-color: var(--violet); }\n  .urlbar button { border: 0; border-radius: var(--r-pill); padding: 0 20px; background: var(--night); color: #fff;\n    font-family: var(--font-display); font-weight: 600; cursor: pointer; }\n\n  .conf { position: absolute; inset: 0; pointer-events: none; overflow: hidden; z-index: -1; }\n  .conf i { position: absolute; width: 12px; height: 12px; border-radius: 3px; opacity: .85; animation: fall linear infinite; }\n  @keyframes fall { 0% { transform: translateY(-20px) rotate(0); } 100% { transform: translateY(110vh) rotate(540deg); } }\n\n  .reel { margin: 56px 0 20px; }\n  .reel .lab { display: flex; align-items: center; gap: 10px; padding: 0 clamp(20px, 5vw, 56px); margin-bottom: 16px; }\n  .reel .lab b { font-family: var(--font-display); font-weight: 600; font-size: 1.15rem; }\n  .reel .lab span { color: var(--ink-soft); font-size: .9rem; }\n  .track { display: flex; gap: 18px; overflow-x: auto; padding: 6px clamp(20px, 5vw, 56px) 30px; scroll-snap-type: x mandatory; }\n  .track::-webkit-scrollbar { height: 8px; }\n  .track::-webkit-scrollbar-thumb { background: var(--line); border-radius: 99px; }\n  .track .deck-card { flex: 0 0 300px; scroll-snap-align: start; }\n<\/style>\n<\/head>\n<body>\n  <nav class=\"nav\">\n    <div class=\"tada-wordmark\"><span class=\"tada-logo\">✦<\/span> TaDa!<\/div>\n    <div class=\"right\"><a href=\"#\">Gallery<\/a><a href=\"#\">Sign in<\/a><\/div>\n  <\/nav>\n\n  <header class=\"hero\">\n    <div class=\"conf\" id=\"conf\"><\/div>\n    <span class=\"eyebrow\">✦ No account needed to try<\/span>\n    <h1>Drop your HTML.<br>We'll do the <span class=\"tada\">TaDa!<\/span><\/h1>\n    <p>Any deck, report, or page made of HTML becomes a clean, full-screen presentation in one second. Then share it with the world.<\/p>\n\n    <label class=\"drop\" id=\"drop\">\n      <input type=\"file\" accept=\".html,.htm,text/html\" hidden id=\"file\">\n      <div class=\"wandbig\">✦<\/div>\n      <h2>Drag a deck here, or click to choose<\/h2>\n      <p>Single-file .html — sections become slides automatically<\/p>\n      <div class=\"row\">\n        <span class=\"tada-upload\"><span class=\"wand\">✦<\/span> Choose .html file<\/span>\n      <\/div>\n      <div class=\"or\">— or paste a link —<\/div>\n      <div class=\"urlbar\" onclick=\"event.preventDefault()\">\n        <input type=\"text\" placeholder=\"yoursite.com/deck.html\" aria-label=\"Deck URL\">\n        <button type=\"button\">Load<\/button>\n      <\/div>\n    <\/label>\n  <\/header>\n\n  <section class=\"reel\">\n    <div class=\"lab\"><b>Fresh from the community<\/b><span>— made with TaDa! this week<\/span><\/div>\n    <div class=\"track\" id=\"track\"><\/div>\n  <\/section>\n\n<script>/* TaDa! homepage prototypes — shared deck gallery data + renderer.\n * Every \"deck\" is drawn as a real 16:9 HTML slide so the wall looks like\n * an actual gallery of beautiful decks. Sizing uses container-query units\n * (cqw) so a thumbnail stays crisp at any size. No build step, no deps. */\n(function (global) {\n  \"use strict\";\n\n  function esc(s) {\n    return String(s).replace(/[&<>\"]/g, function (c) {\n      return { \"&\": \"&amp;\", \"<\": \"&lt;\", \">\": \"&gt;\", '\"': \"&quot;\" }[c];\n    });\n  }\n\n  /* Confetti dots scattered for the playful, human feel. */\n  function dots(colors, n) {\n    var out = \"\";\n    for (var i = 0; i < n; i++) {\n      var c = colors[i % colors.length];\n      var top = (7 + ((i * 37) % 80)).toFixed(1);\n      var left = (6 + ((i * 53) % 86)).toFixed(1);\n      var size = (1.4 + ((i * 7) % 22) / 10).toFixed(1);\n      out +=\n        '<span class=\"ds-dot\" style=\"top:' + top + \"%;left:\" + left +\n        \"%;width:\" + size + \"cqw;height:\" + size + \"cqw;background:\" + c + '\"><\/span>';\n    }\n    return out;\n  }\n\n  function bars(values, accent, accent2) {\n    var out = '<div class=\"ds-bars\">';\n    for (var i = 0; i < values.length; i++) {\n      var col = i === values.length - 1 ? accent : accent2;\n      out +=\n        '<span style=\"height:' + values[i] + \"%;background:\" + col + '\"><\/span>';\n    }\n    return out + \"<\/div>\";\n  }\n\n  /* ---- slide templates, keyed by deck.kind ---------------------------- */\n  var templates = {\n    cover: function (d) {\n      var t = d.theme;\n      return (\n        dots([t.accent, t.accent2, t.accent3], 7) +\n        '<div class=\"ds-eyebrow\" style=\"color:' + t.accent + '\">' + esc(d.eyebrow || d.category) + \"<\/div>\" +\n        '<div class=\"ds-grow\"><\/div>' +\n        '<h3 class=\"ds-title\">' + esc(d.title) + \"<\/h3>\" +\n        (d.sub ? '<p class=\"ds-sub\">' + esc(d.sub) + \"<\/p>\" : \"\") +\n teY(-2px); box-shadow: 0 18px 40px rgb(255 79 104 / 42%); }\n.tada-upload:active { transform: translateY(0); }\n.tada-upload .wand { font-size: 1.15em; }\n\n.tada-ghost {\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n  padding: 14px 22px;\n  border: 1.5px solid var(--line);\n  border-radius: var(--r-pill);\n  background: var(--paper);\n  color: var(--ink);\n  font-family: var(--font-display);\n  font-weight: 500;\n  cursor: pointer;\n  transition: border-color .18s ease, transform .18s ease;\n}\n.tada-ghost:hover { border-color: var(--coral); transform: translateY(-2px); }\n\n/* Brand wordmark lockup */\n.tada-wordmark {\n  display: inline-flex;\n  align-items: center;\n  gap: 10px;\n  font-family: var(--font-display);\n  font-weight: 600;\n  font-size: 1.4rem;\n  letter-spacing: -.01em;\n}\n.tada-logo {\n  display: grid;\n  place-items: center;\n  width: 38px;\n  height: 38px;\n  border-radius: 11px;\n  background: linear-gradient(135deg, #2b1b46, #170d24);\n  color: var(--yellow);\n  font-size: 1.1rem;\n}\n<\/style>\n<style>/* Deck slide + gallery card styling.\n * .deck-slide is a 16:9 container-query context; every measurement inside a\n * slide is in cqw, so the same markup renders perfectly as a tiny thumbnail\n * or a huge hero. Shared by all prototypes. */\n\n.deck-slide {\n  container-type: inline-size;\n  position: relative;\n  aspect-ratio: 16 / 9;\n  width: 100%;\n  overflow: hidden;\n  border-radius: var(--r-md);\n  background: var(--paper);\n}\n\n.ds {\n  position: absolute;\n  inset: 0;\n  display: flex;\n  flex-direction: column;\n  padding: 7cqw;\n  overflow: hidden;\n  font-family: var(--font-display);\n  isolation: isolate;\n}\n.ds-grow { flex: 1; }\n.ds-dot { position: absolute; border-radius: 50%; opacity: .9; z-index: 0; }\n.ds > * { position: relative; z-index: 1; }\n\n.ds-eyebrow {\n  font-family: var(--font-ui);\n  font-size: 3cqw;\n  font-weight: 800;\n  letter-spacing: .16em;\n  text-transform: uppercase;\n}\n\n.ds-title {\n  margin: 1.5cqw 0 0;\n  font-size: 9.5cqw;\n  font-weight: 700;\n  line-height: .98;\n  letter-spacing: -.02em;\n}\n.ds-title.sm { font-size: 7.5cqw; }\n.ds-title.xs { font-size: 5.5cqw; }\n.ds-sub {\n  margin: 2.5cqw 0 0;\n  font-family: var(--font-ui);\n  font-size: 3.6cqw;\n  font-weight: 600;\n  color: var(--soft);\n  line-height: 1.25;\n}\n\n.ds-foot {\n  display: flex;\n  justify-content: space-between;\n  align-items: flex-end;\n  margin-top: auto;\n  padding-top: 3cqw;\n  font-family: var(--font-ui);\n  font-size: 3cqw;\n}\n.ds-by { font-weight: 700; color: var(--soft); }\n.ds-pg { font-weight: 700; color: var(--accent); }\n\n/* stat */\n.ds-statwrap { margin: auto 0; }\n.ds-stat { font-size: 26cqw; line-height: .9; font-weight: 700; letter-spacing: -.03em; }\n.ds-statlabel {\n  margin-top: 1cqw;\n  max-width: 70%;\n  font-family: var(--font-ui);\n  font-size: 3.4cqw;\n  font-weight: 600;\n  color: var(--soft);\n  line-height: 1.2;\n}\n\n/* bars */\n.ds-bars {\n  display: flex;\n  align-items: flex-end;\n  gap: 2.2cqw;\n  height: 26cqw;\n  margin-top: 3cqw;\n}\n.ds-bars span { flex: 1; border-radius: 1.4cqw 1.4cqw 0 0; min-height: 4%; }\n.ds-legend {\n  display: flex;\n  align-items: center;\n  gap: 1.6cqw;\n  margin-top: 3cqw;\n  font-family: var(--font-ui);\n  font-size: 2.7cqw;\n  font-weight: 600;\n  color: var(--soft);\n}\n.ds-legend span { width: 3cqw; height: 3cqw; border-radius: 50%; }\n.ds-legend span:nth-of-type(2) { margin-left: 3cqw; }\n\n/* quote */\n.ds-mark { font-size: 22cqw; line-height: .6; height: 9cqw; }\n.ds-quote {\n  margin: 1cqw 0 0;\n  font-size: 7cqw;\n  font-weight: 600;\n  line-height: 1.1;\n  letter-spacing: -.01em;\n}\n\n/* grid */\n.ds-grid {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 2.4cqw;\n  flex: 1;\n  margin-top: 3cqw;\n}\n.ds-grid span {\n  display: grid;\n  place-items: center;\n  border-radius: 2.6cqw;\n  font-size: 8cqw;\n  font-weight: 700;\n  color: var(--paper);\n}\n.ds-light .ds-grid span:nth-child(2),\n.ds-light .ds-grid span:nth-child(4) { color: var(--ink); }\n.ds-grid span:last-child { border: .8cqw solid currentColor; color: var(--accent); }\n\n/* agenda */\n.ds-agenda { list-style: none; margin: 3cqw 0 0; padding: 0; flex: 1; }\n.ds-agenda li {\n  display: flex;\n  align-items: center;\n  gap: 3cqw;\n  padding: 2.1cqw 0;\n  border-top: .4cqw solid color-mix(in srgb, currentColor 12%, transparent);\n  font-family: var(--font-ui);\n  font-size: 4cqw;\n  font-weight: 600;\n}\n.ds-agenda li:last-child { border-bottom: .4cqw solid color-mix(in srgb, currentColor 12%, transparent); }\n.ds-agenda b { font-family: var(--font-display); font-size: 4.6cqw; }\n\n/* photo */\n.ds-photo { position: absolute; inset: 0; z-index: 0; }\n.ds-shape {\n  position: absolute;\n  right: -8cqw;\n  bottom: -8cqw;\n  width: 38cqw;\n  height: 38cqw;\n  border-radius: 50%;\n  opacity: .5;\n  mix-blend-mode: screen;\n}\n.ds-cap {\n  position: absolute;\n  left: 7cqw;\n  right: 7cqw;\n  bottom: 7cqw;\n  z-index: 2;\n  color: var(--paper);\n  text-shadow: 0 2cqw 6cqw rgb(0 0 0 / 35%);\n}\n.ds-cap .ds-eyebrow { color: var(--paper) !important; opacity: .92; }\n\n/* ---- gallery card wrapper ------------------------------------------- */\n.deck-card {\n  display: block;\n  border-radius: var(--r-md);\n  background: var(--paper);\n  cursor: pointer;\n  transition: transform .22s cubic-bezier(.2,.7,.2,1), box-shadow .22s ease;\n}\n.deck-card .deck-slide {\n  box-shadow: var(--shadow-md);\n  transition: box-shadow .22s ease;\n}\n.deck-card:hover { transform: translateY(-6px); }\n.deck-card:hover .deck-slide { box-shadow: var(--shadow-lg); }\n\n.deck-meta {\n  display: flex;\n  align-items: center;\n  gap: 10px;\n  padding: 12px 4px 2px;\n}\n.deck-avatar {\n  display: grid;\n  place-items: center;\n  width: 30px;\n  height: 30px;\n  flex: 0 0 auto;\n  border-radius: 50%;\n  color: var(--paper);\n  font-family: var(--font-display);\n  font-size: .72rem;\n  font-weight: 600;\n}\n.deck-info { display: flex; flex-direction: column; min-width: 0; line-height: 1.2; }\n.deck-info b { font-size: .9rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }\n.deck-info i { font-style: normal; font-size: .78rem; color: var(--ink-soft); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }\n.deck-likes { margin-left: auto; flex: 0 0 auto; font-size: .8rem; font-weight: 600; color: var(--ink-soft); }\n<\/style>\n<style>\n  :root { --serif: \"Fraunces\", Georgia, \"Times New Roman\", serif; }\n  body { background: var(--cream); color: #2c2114; }\n  .masthead { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;\n    padding: 22px clamp(20px, 5vw, 64px); border-bottom: 2px solid #2c2114; }\n  .masthead .l { display: flex; gap: 20px; font-weight: 600; font-size: .82rem; text-transform: uppercase; letter-spacing: .08em; }\n  .masthead .l a { color: #7a6a4f; }\n  .masthead .brand { font-family: var(--serif); font-weight: 600; font-size: 1.7rem; text-align: center; letter-spacing: -.01em; }\n  .masthead .brand span { color: var(--coral-deep); }\n  .masthead .r { display: flex; justify-content: flex-end; }\n  .masthead .date { font-size: .8rem; color: #7a6a4f; }\n  @media (max-width: 720px) { .masthead { grid-template-columns: 1fr auto; } .masthead .l { display: none; } }\n\n  .kicker { text-align: center; padding: 14px; font-size: .8rem; letter-spacing: .14em; text-transform: uppercase;\n    color: #7a6a4f; border-bottom: 1px solid #ddcfb0; }\n\n  .feature { display: grid; grid-template-columns: 1.15fr 1fr; gap: clamp(28px, 5vw, 64px);\n    align-items: center; padding: clamp(34px, 5vw, 64px) clamp(20px, 5vw, 64px); border-bottom: 1px solid #ddcfb0; }\n  .feature .ey { font-family: var(--font-ui); font-weight: 700; font-size: .78rem; letter-spacing: .14em;\n    text-transform: uppercase; color: var(--coral-deep); }\n  .feature h1 { font-family: var(--serif); font-weight: 600; font-size: clamp(2.4rem, 5vw, 4.2rem);\n    line-height: 1; letter-spacing: -.02em; margin: 16px 0 0; }\n  .feature .lede { font-family: var(--serif); font-size: clamp(1.1rem, 1.6vw, 1.5rem); font-weight: 400;\n    line-height: 1.4; color: #4a3c28; margin: 20px 0 0; max-width: 40ch; }\n  .feature .byline { margin: 22px 0 0; font-size: .9rem; color: #7a6a4f; }\n  .feature .byline b { color: #2c2114; }\n  .feature .cta { margin-top: 26px; display: flex; gap: 12px; flex-wrap: wrap; }\n  .feature .art { position: relative; }\n  .feature .art .deck-slide { box-shadow: 0 30px 70px rgb(44 33 20 / 22%); transform: rotate(1.5deg); border-radius: 8px; }\n  .feature .art figcaption { text-align: center; font-style: italic; font-family: var(--serif); color: #7a6a4f; margin-top: 14px; font-size: .92rem; }\n  @media (max-width: 860px) { .feature { grid-template-columns: 1fr; } }\n\n  .col-head { display: flex; align-items: baseline; gap: 12px; padding: 0 clamp(20px, 5vw, 64px); margin: 40px 0 8px; }\n  .col-head h2 { font-family: var(--serif); font-weight: 600; font-size: 1.7rem; margin: 0; }\n  .col-head .rule { flex: 1; height: 1px; background: #ddcfb0; }\n  .col-head a { font-size: .82rem; font-weight: 600; color: var(--coral-deep); white-space: nowrap; }\n\n  .collection { padding: 8px clamp(20px, 5vw, 64px) 10px; }\n  .collection .note { font-family: var(--serif); font-style: italic; color: #6a5a3e; max-width: 60ch; margin: 0 0 18px; font-size: 1.05rem; }\n  .row3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 26px; }\n  @media (max-width: 820px) { .row3 { grid-template-columns: 1fr 1fr; } }\n  @media (max-width: 540px) { .row3 { grid-template-columns: 1fr; } }\n  /* warm up the card meta for this theme */\n  .collection .deck-info b, .feature .byline b { color: #2c2114; }\n\n  .signup { margin: 50px clamp(20px, 5vw, 64px); padding: clamp(28px, 4vw, 48px); text-align: center;\n    border: 2px solid #2c2114; border-radius: 6px; background: #fffdf6; }\n  .signup h3 { font-family: var(--serif); font-size: clamp(1.6rem, 3vw, 2.4rem); margin: 0 0 8px; font-weight: 600; }\n  .signup p { color: #6a5a3e; margin: 0 0 22px; }\n  footer { padding: 40px clamp(20px, 5vw, 64px); border-top: 2px solid #2c2114; font-size: .85rem; color: #7a6a4f;\n    display: flex; gap: 12px; flex-wrap: wrap; }\n  footer .spacer { margin-left: auto; }\n<\/style>\n<\/head>\n<body>\n  <header class=\"masthead\">\n    <nav class=\"l\"><a href=\"#\">Daily<\/a><a href=\"#\">Collections<\/a><a href=\"#\">Makers<\/a><\/nav>\n    <div class=\"brand\">Ta<span>Da!<\/span><\/div>\n    <div class=\"r\"><button class=\"tada-upload\" style=\"padding:11px 20px;font-size:.95rem\"><span class=\"wand\">✦<\/span> Submit a deck<\/button><\/div>\n  <\/header>\n  <div class=\"kicker\">A daily gallery of the most beautiful HTML decks — curated by humans<\/div>\n\n  <article class=\"feature\">\n    <div>\n      <div class=\"ey\">Deck of the day · {{date}}<\/div>\n      <h1 id=\"fTitle\"><\/h1>\n      <p class=\"lede\" id=\"fLede\"><\/p>\n      <p class=\"byline\">By <b id=\"fAuthor\"><\/b> · pinned because the typography and restraint are simply lovely.<\/p>\n      <div class=\"cta\">\n        <a class=\"tada-ghost\" href=\"#\">Open the deck →<\/a>\n        <button class=\"tada-upload\"><span class=\"wand\">✦<\/span> Pin yours next<\/button>\n      <\/div>\n    <\/div>\n    <figure class=\"art\">\n      <div class=\"deck-slide\" id=\"fArt\"><\/div>\n      <figcaption>Made entirely in a single .html file.<\/figcaption>\n    <\/figure>\n  <\/article>\n\n  <div class=\"col-head\"><h2>The Editors' Picks<\/h2><span class=\"rule\"><\/span><a href=\"#\">See all 12,400 →<\/a><\/div>\n  <section class=\"collection\">\n    <p class=\"note\">A rotating shortlist of decks we keep coming back to — pitches that close, reports you'd actually read, brand books with soul.<\/p>\n    <div class=\"row3\" id=\"picks\"><\/div>\n  <\/section>\n\n  <div class=\"col-head\"><h2>Collection · Founders &amp; Pitches<\/h2><span class=\"rule\"><\/span><a href=\"#\">Follow →<\/a><\/div>\n  <section class=\"collection\"><div class=\"row3\" id=\"coll2\"><\/div><\/section>\n\n  <div class=\"col-head\"><h2>Collection · Studios &amp; Brand<\/h2><span class=\"rule\"><\/span><a href=\"#\">Follow →<\/a><\/div>\n  <section class=\"collection\"><div class=\"row3\" id=\"coll3\"><\/div><\/section>\n\n  <section class=\"signup\">\n    <h3>Have a deck this good?<\/h3>\n    <p>Drop the HTML — it's live and shareable in seconds. No editor, no export, no fuss.<\/p>\n    <button class=\"tada-upload\" style=\"margin:0 auto\"><span class=\"wand\">✦<\/span> Upload your deck<\/button>\n  <\/section>\n\n  <footer>\n    <div class=\"brand\" style=\"font-family:var(--serif);font-size:1.2rem;font-weight:600\">Ta<span style=\"color:var(--coral-deep)\">Da!<\/span><\/div>\n    <span class=\"spacer\"><\/span><span>Curated with care · praktikal.ai/tada<\/span>\n  <\/footer>\n\n<script>/* TaDa! homepage prototypes — shared deck gallery data + renderer.\n * Every \"deck\" is drawn as a real 16:9 HTML slide so the wall looks like\n * an actual gallery of beautiful decks. Sizing uses container-query units\n * (cqw) so a thumbnail stays crisp at any size. No build step, no deps. */\n(function (global) {\n  \"use strict\";\n\n  function esc(s) {\n    return String(s).replace(/[&<>\"]/g, function (c) {\n      return { \"&\": \"&amp;\", \"<\": \"&lt;\", \">\": \"&gt;\", '\"': \"&quot;\" }[c];\n    });\n  }\n\n  /* Confetti dots scattered for the playful, human feel. */\n  function dots(colors, n) {\n    var out = \"\";\n    for (var i = 0; i < n; i++) {\n      var c = colors[i % colors.length];\n      var top = (7 + ((i * 37) % 80)).toFixed(1);\n      var left = (6 + ((i * 53) % 86)).toFixed(1);\n      var size = (1.4 + ((i * 7) % 22) / 10).toFixed(1);\n      out +=\n        '<span class=\"ds-dot\" style=\"top:' + top + \"%;left:\" + left +\n        \"%;width:\" + size + \"cqw;height:\" + size + \"cqw;background:\" + c + '\"><\/span>';\n    }\n    return out;\n  }\n\n  function bars(values, accent, accent2) {\n    var out = '<div class=\"ds-bars\">';\n    for (var i = 0; i < values.length; i++) {\n      var col = i === values.length - 1 ? accent : accent2;\n      out +=\n        '<span style=\"height:' + values[i] + \"%;background:\" + col + '\"><\/span>';\n    }\n    return out + \"<\/div>\";\n  }\n\n  /* ---- slide templates, keyed by deck.kind ---------------------------- */\n  var templates = {\n    cover: function (d) {\n      var t = d.theme;\n      return (\n        dots([t.accent, t.accent2, t.accent3], 7) +\n        '<div class=\"ds-eyebrow\" style=\"color:' + t.accent + '\">' + esc(d.eyebrow || d.category) + \"<\/div>\" +\n        '<div class=\"ds-grow\"><\/div>' +\n        '<h3 class=\"ds-title\">' + esc(d.title) + \"<\/h3>\" +\n        (d.sub ? '<p class=\"ds-sub\">' + esc(d.sub) + \"<\/p>\" : \"\") +\n        '<div class=\"ds-foot\"><span class=\"ds-by\">' + esc(d.author) + \"<\/span><span class=\\\"ds-pg\\\">01<\/span><\/div>\"\n      );\n    },\n    stat: function (d) {\n      var t = d.theme;\n      return (\n        '<div class=\"ds-eyebrow\" style=\"color:' + t.accent + '\">' + esc(d.eyebrow || d.category) + \"<\/div>\" +\n        '<div class=\"ds-statwrap\"><div class=\"ds-stat\" style=\"color:' + t.accent + '\">' + esc(d.stat) + \"<\/div>\" +\n        '<div class=\"ds-statlabel\">' + esc(d.statLabel) + \"<\/div><\/div>\" +\n        bars(d.bars || [40, 60, 52, 78, 100], t.accent, t.accent2) +\n        '<div class=\"ds-foot\"><span class=\"ds-by\">' + esc(d.author) + \"<\/span><span class=\\\"ds-pg\\\">04<\/span><\/div>\"\n      );\n    },\n    chart: function (d) {\n      var t = d.theme;\n      return (\n        '<div class=\"ds-eyebrow\" style=\"color:' + t.accent + '\">' + esc(d.eyebrow || d.category) + \"<\/div>\" +\n        '<h3 class=\"ds-title sm\">' + esc(d.title) + \"<\/h3>\" +\n        bars(d.bars || [34, 52, 44, 70, 58, 92], t.accent, t.accent2) +\n        '<div clas ds-eyebrow { color: var(--paper) !important; opacity: .92; }\n\n/* ---- gallery card wrapper ------------------------------------------- */\n.deck-card {\n  display: block;\n  border-radius: var(--r-md);\n  background: var(--paper);\n  cursor: pointer;\n  transition: transform .22s cubic-bezier(.2,.7,.2,1), box-shadow .22s ease;\n}\n.deck-card .deck-slide {\n  box-shadow: var(--shadow-md);\n  transition: box-shadow .22s ease;\n}\n.deck-card:hover { transform: translateY(-6px); }\n.deck-card:hover .deck-slide { box-shadow: var(--shadow-lg); }\n\n.deck-meta {\n  display: flex;\n  align-items: center;\n  gap: 10px;\n  padding: 12px 4px 2px;\n}\n.deck-avatar {\n  display: grid;\n  place-items: center;\n  width: 30px;\n  height: 30px;\n  flex: 0 0 auto;\n  border-radius: 50%;\n  color: var(--paper);\n  font-family: var(--font-display);\n  font-size: .72rem;\n  font-weight: 600;\n}\n.deck-info { display: flex; flex-direction: column; min-width: 0; line-height: 1.2; }\n.deck-info b { font-size: .9rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }\n.deck-info i { font-style: normal; font-size: .78rem; color: var(--ink-soft); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }\n.deck-likes { margin-left: auto; flex: 0 0 auto; font-size: .8rem; font-weight: 600; color: var(--ink-soft); }\n<\/style>\n<style>\n  body { background: var(--night); color: var(--paper); overflow-x: hidden; }\n  .nav { position: fixed; top: 0; left: 0; right: 0; z-index: 60; display: flex; align-items: center; gap: 16px;\n    padding: 16px clamp(20px, 5vw, 56px); }\n  .nav .tada-wordmark { color: var(--paper); }\n  .nav .tada-logo { background: rgba(255,255,255,.1); }\n  .nav .right { margin-left: auto; display: flex; gap: 12px; align-items: center; }\n  .nav .right a { color: rgba(255,253,253,.78); font-weight: 600; font-size: .92rem; }\n\n  /* the immersive wall */\n  .wall { position: relative; min-height: 100vh; display: flex; flex-direction: column; justify-content: center;\n    gap: clamp(14px, 1.6vw, 22px); padding: 80px 0; overflow: hidden; }\n  .marquee { display: flex; gap: clamp(14px, 1.6vw, 22px); width: max-content; }\n  .row-a { animation: scrollL 60s linear infinite; }\n  .row-b { animation: scrollR 72s linear infinite; }\n  .row-c { animation: scrollL 84s linear infinite; }\n  @keyframes scrollL { to { transform: translateX(-50%); } }\n  @keyframes scrollR { from { transform: translateX(-50%); } to { transform: translateX(0); } }\n  .marquee .deck-slide { width: clamp(220px, 24vw, 340px); flex: 0 0 auto; border-radius: 14px;\n    box-shadow: 0 20px 50px rgb(0 0 0 / 45%); }\n  .wall:hover .marquee { animation-play-state: paused; }\n\n  /* dark scrim + glass hero */\n  .scrim { position: absolute; inset: 0; z-index: 5; pointer-events: none;\n    background: radial-gradient(75% 60% at 50% 50%, rgb(23 13 36 / 78%) 0%, rgb(23 13 36 / 38%) 55%, rgb(23 13 36 / .86) 100%); }\n  .hero { position: absolute; inset: 0; z-index: 10; display: grid; place-items: center; padding: 20px; }\n  .glass { width: min(680px, 92vw); text-align: center; padding: clamp(30px, 5vw, 52px);\n    border: 1px solid rgba(255,253,253,.16); border-radius: var(--r-lg);\n    background: rgba(38,24,51,.55); backdrop-filter: blur(18px) saturate(1.1);\n    box-shadow: 0 40px 100px rgb(0 0 0 / 50%); }\n  .glass .pill { display: inline-flex; align-items: center; gap: 8px; padding: 7px 15px; border-radius: var(--r-pill);\n    background: rgba(255,253,253,.1); border: 1px solid rgba(255,253,253,.18); font-weight: 600; font-size: .82rem; color: var(--yellow); }\n  .glass h1 { font-family: var(--font-display); font-weight: 700; letter-spacing: -.03em; margin: 20px 0 0;\n    font-size: clamp(2.3rem, 5.5vw, 4rem); line-height: .98; }\n  .glass h1 em { font-style: normal; background: linear-gradient(120deg, var(--yellow), var(--coral) 55%, var(--violet));\n    -webkit-background-clip: text; background-clip: text; color: transparent; }\n  .glas our own file and join the wall.<\/p>\n        <div class=\"search\"><input type=\"text\" placeholder=\"Search pitches, brands, reports…\" aria-label=\"Search decks\"><\/div>\n        <div class=\"cta\">\n          <button class=\"tada-upload\"><span class=\"wand\">✦<\/span> Upload your deck<\/button>\n          <a class=\"tada-ghost\" href=\"#\">Surprise me<\/a>\n        <\/div>\n        <p class=\"stat\">Free to share · sections become slides automatically<\/p>\n      <\/div>\n    <\/div>\n    <div class=\"scroll-hint\">Hover to pause · the whole wall is live HTML<\/div>\n  <\/section>\n\n<script>/* TaDa! homepage prototypes — shared deck gallery data + renderer.\n * Every \"deck\" is drawn as a real 16:9 HTML slide so the wall looks like\n * an actual gallery of beautiful decks. Sizing uses container-query units\n * (cqw) so a thumbnail stays crisp at any size. No build step, no deps. */\n(function (global) {\n  \"use strict\";\n\n  function esc(s) {\n    return String(s).replace(/[&<>\"]/g, function (c) {\n      return { \"&\": \"&amp;\", \"<\": \"&lt;\", \">\": \"&gt;\", '\"': \"&quot;\" }[c];\n    });\n  }\n\n  /* Confetti dots scattered for the playful, human feel. */\n  function dots(colors, n) {\n    var out = \"\";\n    for (var i = 0; i < n; i++) {\n      var c = colors[i % colors.length];\n      var top = (7 + ((i * 37) % 80)).toFixed(1);\n      var left = (6 + ((i * 53) % 86)).toFixed(1);\n      var size = (1.4 + ((i * 7) % 22) / 10).toFixed(1);\n      out +=\n        '<span class=\"ds-dot\" style=\"top:' + top + \"%;left:\" + left +\n        \"%;width:\" + size + \"cqw;height:\" + size + \"cqw;background:\" + c + '\"><\/span>';\n    }\n    return out;\n  }\n\n  function bars(values, accent, accent2) {\n    var out = '<div class=\"ds-bars\">';\n    for (var i = 0; i < values.length; i++) {\n      var col = i === values.length - 1 ? accent : accent2;\n      out +=\n        '<span style=\"height:' + values[i] + \"%;background:\" + col + '\"><\/span>';\n    }\n    return out + \"<\/div>\";\n  }\n\n  /* ---- slide templates, keyed by deck.kind ---------------------------- */\n  var templates = {\n    cover: function (d) {\n      var t = d.theme;\n      return (\n        dots([t.accent, t.accent2, t.accent3], 7) +\n        '<div class=\"ds-eyebrow\" style=\"color:' + t.accent + '\">' + esc(d.eyebrow || d.category) + \"<\/div>\" +\n        '<div class=\"ds-grow\"><\/div>' +\n        '<h3 class=\"ds-title\">' + esc(d.title) + \"<\/h3>\" +\n        (d.sub ? '<p class=\"ds-sub\">' + esc(d.sub) + \"<\/p>\" : \"\") +\n        '<div class=\"ds-foot\"><span class=\"ds-by\">' + esc(d.author) + \"<\/span><span class=\\\"ds-pg\\\">01<\/span><\/div>\"\n      );\n    },\n    stat: function (d) {\n      var t = d.theme;\n      return (\n        '<div class=\"ds-eyebrow\" style=\"color:' + t.accent + '\">' + esc(d.eyebrow || d.category) + \"<\/div>\" +\n        '<div class=\"ds-statwrap\"><div class=\"ds-stat\" style=\"color:' + t.accent + '\">' + esc(d.stat) + \"<\/div>\" +\n        '<div class=\"ds-statlabel\">' + esc(d.statLabel) + \"<\/div><\/div>\" +\n        bars(d.bars || [40, 60, 52, 78, 100], t.accent, t.accent2) +\n        '<div class=\"ds-foot\"><span class=\"ds-by\">' + esc(d.author) + \"<\/span><span class=\\\"ds-pg\\\">04<\/span><\/div>\"\n      );\n    },\n    chart: function (d) {\n      var t = d.theme;\n      return (\n        '<div class=\"ds-eyebrow\" style=\"color:' + t.accent + '\">' + esc(d.eyebrow || d.category) + \"<\/div>\" +\n        '<h3 class=\"ds-title sm\">' + esc(d.title) + \"<\/h3>\" +\n        bars(d.bars || [34, 52, 44, 70, 58, 92], t.accent, t.accent2) +\n        '<div class=\"ds-legend\"><span style=\"background:' + t.accent2 + '\"><\/span>' + esc(d.legend || \"Last year\") +\n        '<span style=\"background:' + t.accent + '\"><\/span>' + esc(d.legend2 || \"This year\") + \"<\/div>\"\n      );\n    },\n    quote: function (d) {\n      var t = d.theme;\n      return (\n        '<div class=\"ds-mark\" style=\"color:' + t.accent + '\">&ldquo;<\/div>' +\n        '<p class=\"ds-quote\">' + esc(d.title) + \"<\/p>\" +\n        '<div class=\"ds-foot\"><span class=\"ds-by\">' + esc(d.author) + \"<\/span><\/div>\"\n      );\n    },\n    grid: function (d) {\n      var t = d.theme;\n      var cells = (d.cells || [\"Aa\", \"Bb\", \"01\", \"→\"]);\n      var inner = \"\";\n      for (var i = 0; i < cells.length; i++) {\n        var bg = [t.accent, t.accent2, t.accent3, \"transparent\"][i % 4];\n        inner += '<span style=\"background:' + bg + '\">' + esc(cells[i]) + \"<\/span>\";\n      }\n      return (\n        '<div class=\"ds-eyebrow\" style=\"color:' + t.accent + '\">' + esc(d.eyebrow || d.category) + \"<\/div>\" +\n        '<h3 class=\"ds-title sm\">' + esc(d.title) + \"<\/h3>\" +\n        '<div class=\"ds-grid\">' + inner + \"<\/div>\"\n      );\n    },\n    agenda: function (d) {\n      var t = d.theme;\n      var items = d.items || [\"Encoding\", \"Storage\", \"Retrieval\", \"Forgetting\"];\n      var inner = \"\";\n      for (var i = 0; i < items.length; i++) {\n        inner +=\n          '<li><b style=\"color:' + t.accent + '\">' + (i + 1) +\n          \"<\/b>\" + esc(items[i]) + \"<\/li>\";\n      }\n      return (\n        '<div class=\"ds-eyebrow\" style=\"color:' + t.accent + '\">' + esc(d.eyebrow || d.category) + \"<\/div>\" +\n        '<h3 class=\"ds-title sm\">' + esc(d.title) + \"<\/h3>\" +\n        '<ol class=\"ds-agenda\">' + inner + \"<\/ol>\"\n      );\n    },\n    photo: function (d) {\n      var t = d.theme;\n      return (\n        '<div class=\"ds-photo\" style=\"background:' + (d.photo || t.bg) + '\">' +\n        dots([t.accent, t.accent2, t.accent3], 5) +\n        '<div class=\"ds-shape\" style=\"background:' + t.accent2 + '\"><\/div>' +\n        \"<\/div>\" +\n        '<div class=\"ds-cap\"><div class=\"ds-eyebrow\" style=\"color:' + t.accent + '\">' + esc(d.eyebrow || d.category) + \"<\/div>\" +\n        '<h3 class=\"ds-title xs\">' + n><\/div>\n    <\/article>\n\n    <div class=\"cell c-deck\" id=\"d1\"><\/div>\n    <div class=\"cell c-deck\" id=\"d2\"><\/div>\n\n    <section class=\"cell c-stat\"><b>12.4k<\/b><span>decks shared &amp; counting<\/span><\/section>\n    <section class=\"cell c-cats\">\n      <div class=\"ey\">Browse by<\/div>\n      <div class=\"tags\"><span>Pitch<\/span><span>Brand<\/span><span>Report<\/span><span>Product<\/span><span>Travel<\/span><span>Event<\/span><\/div>\n    <\/section>\n\n    <div class=\"cell c-deck\" id=\"d3\"><\/div>\n    <div class=\"cell c-deck\" id=\"d4\"><\/div>\n    <div class=\"cell c-deck\" id=\"d5\"><\/div>\n    <div class=\"cell c-deck\" id=\"d6\"><\/div>\n  <\/main>\n\n  <footer>Drop HTML. Cue the show. · praktikal.ai/tada<\/footer>\n\n<script>/* TaDa! homepage prototypes — shared deck gallery data + renderer.\n * Every \"deck\" is drawn as a real 16:9 HTML slide so the wall looks like\n * an actual gallery of beautiful decks. Sizing uses container-query units\n * (cqw) so a thumbnail stays crisp at any size. No build step, no deps. */\n(function (global) {\n  \"use strict\";\n\n  function esc(s) {\n    return String(s).replace(/[&<>\"]/g, function (c) {\n      return { \"&\": \"&amp;\", \"<\": \"&lt;\", \">\": \"&gt;\", '\"': \"&quot;\" }[c];\n    });\n  }\n\n  /* Confetti dots scattered for the playful, human feel. */\n  function dots(colors, n) {\n    var out = \"\";\n    for (var i = 0; i < n; i++) {\n      var c = colors[i % colors.length];\n      var top = (7 + ((i * 37) % 80)).toFixed(1);\n      var left = (6 + ((i * 53) % 86)).toFixed(1);\n      var size = (1.4 + ((i * 7) % 22) / 10).toFixed(1);\n      out +=\n        '<span class=\"ds-dot\" style=\"top:' + top + \"%;left:\" + left +\n        \"%;width:\" + size + \"cqw;height:\" + size + \"cqw;background:\" + c + '\"><\/span>';\n    }\n    return out;\n  }\n\n  function bars(values, accent, accent2) {\n    var out = '<div class=\"ds-bars\">';\n    for (var i = 0; i < values.length; i++) {\n      var col = i === values.length - 1 ? accent : accent2;\n      out +=\n        '<span style=\"height:' + values[i] + \"%;background:\" + col + '\"><\/span>';\n    }\n    return out + \"<\/div>\";\n  }\n\n  /* ---- slide templates, keyed by deck.kind ---------------------------- */\n  var templates = {\n    cover: function (d) {\n      var t = d.theme;\n      return (\n        dots([t.accent, t.accent2, t.accent3], 7) +\n        '<div class=\"ds-eyebrow\" style=\"color:' + t.accent + '\">' + esc(d.eyebrow || d.category) + \"<\/div>\" +\n        '<div class=\"ds-grow\"><\/div>' +\n        '<h3 class=\"ds-title\">' + esc(d.title) + \"<\/h3>\" +\n        (d.sub ? '<p class=\"ds-sub\">' + esc(d.sub) + \"<\/p>\" : \"\") +\n        '<div class=\"ds-foot\"><span class=\"ds-by\">' + esc(d.author) + \"<\/span><span class=\\\"ds-pg\\\">01<\/span><\/div>\"\n      );\n    },\n    stat: function (d) {\n      var t = d.theme;\n      return (\n        '<div class=\"ds-eyebrow\" style=\"color:' + t.accent + '\">' + esc(d.eyebrow || d.category) + \"<\/div>\" +\n        '<div class=\"ds-statwrap\"><div class=\"ds-stat\" style=\"color:' + t.accent + '\">' + esc(d.stat) + \"<\/div>\" +\n        '<div class=\"ds-statlabel\">' + esc(d.statLabel) + \"<\/div><\/div>\" +\n        bars(d.bars || [40, 60, 52, 78, 100], t.accent, t.accent2) +\n        '<div class=\"ds-foot\"><span class=\"ds-by\">' + esc(d.author) + \"<\/span><span class=\\\"ds-pg\\\">04<\/span><\/div>\"\n      );\n    },\n    chart: function (d) {\n      var t = d.theme;\n      return (\n        '<div class=\"ds-eyebrow\" style=\"color:' + t.accent + '\">' + esc(d.eyebrow || d.category) + \"<\/div>\" +\n        '<h3 class=\"ds-title sm\">' + esc(d.title) + \"<\/h3>\" +\n        bars(d.bars || [34, 52, 44, 70, 58, 92], t.accent, t.accent2) +\n        '<div class=\"ds-legend\"><span style=\"background:' + t.accent2 + '\"><\/span>' + esc(d.legend || \"Last year\") +\n        '<span style=\"background:' + t.accent + '\"><\/span>' + esc(d.legend2 || \"This year\") + \"<\/div>\"\n      );\n    },\n    quote: function (d) {\n      var t = d.theme;\n      return (\n        '<div class=\"ds-mark\" style=\"color:' + t.accent + '\">&ldquo;<\/div>' +\n        '<p class=\"ds-quote\">' + esc(d.title) + \"<\/p>\" +\n        '<div class=\"ds-foot\"><span class=\"ds-by\">' + esc(d.author) + \"<\/span><\/div>\"\n      );\n    },\n    grid: function (d) {\n      var t = d.theme;\n      var cells = (d.cells || [\"Aa\", \"Bb\", \"01\", \"→\"]);\n      var inner = \"\";\n      for (var i = 0; i < cells.length; i++) {\n        var bg = [t.accent, t.accent2, t.accent3, \"transparent\"][i % 4];\n        inner += '<span style=\"background:' + bg + '\">' + esc(cells[i]) + \"<\/span>\";\n      }\n      return (\n        '<div class=\"ds-eyebrow\" style=\"color:' + t.accent + '\">' + esc(d.eyebrow || d.category) + \"<\/div>\" +\n        '<h3 class=\"ds-title sm\">' + esc(d.title) + \"<\/h3>\" +\n        '<div class=\"ds-grid\">' + inner + \"<\/div>\"\n      );\n    },\n    agenda: function (d) {\n      var t = d.theme;\n      var items = d.items || [\"Encoding\", \"Storage\", \"Retrieval\", \"Forgetting\"];\n      var inner = \"\";\n      for (var i = 0; i < items.length; i++) {\n        inner +=\n          '<li><b style=\"color:' + t.accent + '\">' + (i + 1) +\n          \"<\/b>\" + esc(items[i]) + \"<\/li>\";\n      }\n      return (\n        '<div class=\"ds-eyebrow\" style=\"color:' + t.accent + '\">' + esc(d.eyebrow || d.category) + \"<\/div>\" +\n        '<h3 class=\"ds-title sm\">' + esc(d.title) + \"<\/h3>\" +\n        '<ol class=\"ds-agenda\">' + inner + \"<\/ol>\"\n      );\n    },\n    photo: function (d) {\n      var t = d.theme;\n      return (\n        '<div class=\"ds-photo\" style=\"background:' + (d.photo || t.bg) + '\">' +\n        dots([t.accent, t.accent2, t.accent3], 5) +\n        '<div class=\"ds-shape\" style=\"background:' + t.accent2 + '\"><\/div>' +\n        \"<\/div>\" +\n        '<div class=\"ds-cap\"><div class=\"ds-eyebrow\" style=\"color:' + t.accent + '\">' + esc(d.eyebrow || d.category) + \"<\/div>\" +\n        '<h3 class=\"ds-title xs\">' + esc(d.title) + \"<\/h3><\/div>\"\n      );\n    },\n  };\n\n  function renderDeck(d) {\n    var t = d.theme;\n    var body = (templates[d.kind] || templates.cover)(d);\n    return (\n      '<div class=\"ds ' + (t.mode === \"dark\" ? \"ds-dark\" : \"ds-light\") +\n      ' ds-' + d.kind + '\" style=\"background:' + t.bg + \";color:\" + t.ink +\n      ';--accent:' + t.accent + \";--accent2:\" + t.accent2 +\n      ';--soft:' + (t.soft || \"rgba(0,0,0,.5)\") + '\">' + body + \"<\/div>\"\n    );\n  }\n\n  /* Full gallery card = slide + meta row (author, category, likes). */\n  function renderCard(d, extraClass) {\n    return (\n      '<a class=\"deck-card ' + (extraClass || \"\") + '\" href=\"#\" data-deck=\"' + esc(d.id) +\n      '\" aria-label=\"' + esc(d.title) + ' by ' + esc(d.author) + '\">' +\n      '<div class=\"deck-slide\">' + renderDeck(d) + \"<\/div>\" +\n      '<div class=\"deck-meta\">' +\n      '<span class=\"deck-avatar\" style=\"background:' + d.avatarColor + '\">' + esc(d.initials) + \"<\/span>\" +\n      '<span class=\"deck-info\"><b>' + esc(d.title) + \"<\/b><i>\" + esc(d.author) + \"<\/i><\/span>\" +\n      '<span class=\"deck-likes\">♥ ' + d.likes + \"<\/span>\" +\n      \"<\/div><\/a>\"\n    );\n  }\n\n  /* ---- the gallery: a curated set of \"the best decks globally\" -------- */\n  var P = {\n    night: \"#170d24\", plum: \"#23162e\", paper: \"#fffdfd\", cream: \"#fff7df\",\n    coral: \"#ff4f68\", coralDeep: \"#df3651\", mint: \"#32c6b1\", yellow: \"#ffd24f\",\n    violet: \"#7c4dff\", sky: \"#3867e8\", ink: \"#23162e\", soft: \"#766b7c\",\n  };\n\n  var decks = [\n    {\n      id: \"calm\", title: \"The Future of Calm Technology\", author: \"Maya Okonkwo\",\n      initials: \"MO\", avatarColor: P.mint, category: \"Keynote\", likes: \"2.4k\",\n      featured: true, kind: \"cover\" redoka:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap\" rel=\"stylesheet\">\n<style>/* TaDa! brand tokens — shared across every homepage prototype.\n * Pulled from the product icon + product deck: plum night, paper, cream,\n * coral, mint, sunny yellow, violet. Light, friendly, human, rounded. */\n:root {\n  --night: #170d24;\n  --plum: #23162e;\n  --ink: #23162e;\n  --ink-soft: #766b7c;\n  --paper: #fffdfd;\n  --cream: #fff7df;\n  --coral: #ff4f68;\n  --coral-deep: #df3651;\n  --mint: #32c6b1;\n  --yellow: #ffd24f;\n  --violet: #7c4dff;\n  --sky: #3867e8;\n  --line: #eadbea;\n  --line-soft: #f1eef0;\n\n  --font-display: \"Fredoka\", \"Baloo 2\", \"Arial Rounded MT Bold\", \"Avenir Next\",\n    ui-rounded, \"Segoe UI\", system-ui, sans-serif;\n  --font-ui: \"Inter\", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,\n    \"Segoe UI\", sans-serif;\n\n  --shadow-sm: 0 4px 14px rgb(35 22 46 / 8%);\n  --shadow-md: 0 14px 40px rgb(35 22 46 / 12%);\n  --shadow-lg: 0 30px 80px rgb(35 22 46 / 18%);\n  --r-sm: 12px;\n  --r-md: 18px;\n  --r-lg: 28px;\n  --r-pill: 999px;\n}\n\n* { box-sizing: border-box; }\n\nhtml { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }\n\nbody {\n  margin: 0;\n  font-family: var(--font-ui);\n  color: var(--ink);\n  background: var(--paper);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nimg { max-width: 100%; display: block; }\na { color: inherit; text-decoration: none; }\n\n/* The signature TaDa! upload button — big, friendly, unmissable. */\n.tada-upload {\n  display: inline-flex;\n  align-items: center;\n  gap: 10px;\n  padding: 15px 26px;\n  border: 0;\n  border-radius: var(--r-pill);\n  background: linear-gradient(135deg, var(--coral), var(--coral-deep));\n  color: var(--paper);\n  font-family: var(--font-display);\n  font-size: 1.05rem;\n  font-weight: 600;\n  cursor: pointer;\n  box-shadow: 0 12px 30px rgb(255 79 104 / 34%);\n  transition: transform .18s ease, box-shadow .18s ease;\n}\n.tada-upload:hover { transform: translateY(-2px); box-shadow: 0 18px 40px rgb(255 79 104 / 42%); }\n.tada-upload:active { transform: translateY(0); }\n.tada-upload .wand { font-size: 1.15em; }\n\n.tada-ghost {\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n  padding: 14px 22px;\n  border: 1.5px solid var(--line);\n  border-radius: var(--r-pill);\n  background: var(--paper);\n  color: var(--ink);\n  font-family: var(--font-display);\n  font-weight: 500;\n  cursor: pointer;\n  transition: border-color .18s ease, transform .18s ease;\n}\n.tada-ghost:hover { border-color: var(--coral); transform: translateY(-2px); }\n\n/* Brand wordmark lockup */\n.tada-wordmark {\n  display: inline-flex;\n  align-items: center;\n  gap: 10px;\n  font-family: var(--font-display);\n  font-weight: 600;\n  font-size: 1.4rem;\n  letter-spacing: -.01em;\n}\n.tada-logo {\n  display: grid;\n  place-items: center;\n  width: 38px;\n  height: 38px;\n  border-radius: 11px;\n  background: linear-gradient(135deg, #2b1b46, #170d24);\n  color: var(--yellow);\n  font-size: 1.1rem;\n}\n<\/style>\n<style>/* Deck slide + gallery card styling.\n * .deck-slide is a 16:9 container-query context; every measurement inside a\n * slide is in cqw, so the same markup renders perfectly as a tiny thumbnail\n * or a huge hero. Shared by all prototypes. */\n\n.deck-slide {\n  container-type: inline-size;\n  position: relative;\n  aspect-ratio: 16 / 9;\n  width: 100%;\n  overflow: hidden;\n  border-radius: var(--r-md);\n  background: var(--paper);\n}\n\n.ds {\n  position: absolute;\n  inset: 0;\n  display: flex;\n  flex-direction: column;\n  padding: 7cqw;\n  overflow: hidden;\n  font-family: var(--font-display);\n  isolation: isolate;\n}\n.ds-grow { flex: 1; }\n.ds-dot { position: absolute; border-radius: 50%; opacity: .9; z-index: 0; }\n.ds > * { position: relative; z-index: 1; }\n\n.ds-eyebrow {\n  font-family: var(--font-ui);\n  font-size: 3cqw;\n  font-weight: 800;\n  letter- : 700;\n  color: var(--paper);\n}\n.ds-light .ds-grid span:nth-child(2),\n.ds-light .ds-grid span:nth-child(4) { color: var(--ink); }\n.ds-grid span:last-child { border: .8cqw solid currentColor; color: var(--accent); }\n\n/* agenda */\n.ds-agenda { list-style: none; margin: 3cqw 0 0; padding: 0; flex: 1; }\n.ds-agenda li {\n  display: flex;\n  align-items: center;\n  gap: 3cqw;\n  padding: 2.1cqw 0;\n  border-top: .4cqw solid color-mix(in srgb, currentColor 12%, transparent);\n  font-family: var(--font-ui);\n  font-size: 4cqw;\n  font-weight: 600;\n}\n.ds-agenda li:last-child { border-bottom: .4cqw solid color-mix(in srgb, currentColor 12%, transparent); }\n.ds-agenda b { font-family: var(--font-display); font-size: 4.6cqw; }\n\n/* photo */\n.ds-photo { position: absolute; inset: 0; z-index: 0; }\n.ds-shape {\n  position: absolute;\n  right: -8cqw;\n  bottom: -8cqw;\n  width: 38cqw;\n  height: 38cqw;\n  border-radius: 50%;\n  opacity: .5;\n  mix-blend-mode: screen;\n}\n.ds-cap {\n  position: absolute;\n  left: 7cqw;\n  right: 7cqw;\n  bottom: 7cqw;\n  z-index: 2;\n  color: var(--paper);\n  text-shadow: 0 2cqw 6cqw rgb(0 0 0 / 35%);\n}\n.ds-cap .ds-eyebrow { color: var(--paper) !important; opacity: .92; }\n\n/* ---- gallery card wrapper ------------------------------------------- */\n.deck-card {\n  display: block;\n  border-radius: var(--r-md);\n  background: var(--paper);\n  cursor: pointer;\n  transition: transform .22s cubic-bezier(.2,.7,.2,1), box-shadow .22s ease;\n}\n.deck-card .deck-slide {\n  box-shadow: var(--shadow-md);\n  transition: box-shadow .22s ease;\n}\n.deck-card:hover { transform: translateY(-6px); }\n.deck-card:hover .deck-slide { box-shadow: var(--shadow-lg); }\n\n.deck-meta {\n  display: flex;\n  align-items: center;\n  gap: 10px;\n  padding: 12px 4px 2px;\n}\n.deck-avatar {\n  display: grid;\n  place-items: center;\n  width: 30px;\n  height: 30px;\n  flex: 0 0 auto;\n  border-radius: 50%;\n  color: var(--paper);\n  font-family: var(--font-display);\n  font-size: .72rem;\n  font-weight: 600;\n}\n.deck-info { display: flex; flex-direction: column; min-width: 0; line-height: 1.2; }\n.deck-info b { font-size: .9rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }\n.deck-info i { font-style: normal; font-size: .78rem; color: var(--ink-soft); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }\n.deck-likes { margin-left: auto; flex: 0 0 auto; font-size: .8rem; font-weight: 600; color: var(--ink-soft); }\n<\/style>\n<style>\n  body { background: var(--paper); }\n  .nav { display: flex; align-items: center; padding: 24px clamp(20px, 5vw, 56px); max-width: 1100px; margin: 0 auto; }\n  .nav .right { margin-left: auto; display: flex; gap: 14px; align-items: center; }\n  .nav .right a { font-weight: 600; color: var(--ink-soft); font-size: .92rem; }\n\n  .hero { max-width: 880px; margin: 0 auto; text-align: center; padding: clamp(48px, 9vw, 110px) 20px clamp(28px, 4vw, 44px); }\n  .hero .ey { display: inline-flex; align-items: center; gap: 8px; font-weight: 600; font-size: .85rem;\n    color: var(--ink-soft); letter-spacing: .02em; }\n  .hero .ey b { color: var(--coral-deep); }\n  .hero h1 { font-family: var(--font-display); font-weight: 700; letter-spacing: -.035em;\n    font-size: clamp(2.8rem, 8vw, 5.6rem); line-height: .95; margin: 22px 0 0; }\n  .hero h1 .g { background: linear-gradient(115deg, var(--coral), var(--violet) 70%); -webkit-background-clip: text; background-clip: text; color: transparent; }\n  .hero p { font-size: clamp(1.1rem, 1.7vw, 1.4rem); color: var(--ink-soft); line-height: 1.5; margin: 26px auto 0; max-width: 50ch; }\n  .hero .cta { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 34px; }\n  .hero .tiny { margin-top: 18px; font-size: .85rem; color: var(--ink-soft); }\n\n  .showcase { max-width: 980px; margin: 10px auto 0; padding: 0 20px; }\n  .showcase .frame { border-radius: var(--r-lg); overflow: hidden; box-s
