<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; frame-src 'self' about: data: blob: tada-slide: https://docs.google.com https://*.google.com; object-src 'none'; base-uri 'self'; form-action 'none'"
    >
    <title>TaDa! Audience</title>
    <style>
      * { box-sizing: border-box; }
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #050505;
        color: #fff;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .audience-stage,
      iframe {
        width: 100vw;
        height: 100vh;
      }
      .audience-stage {
        position: fixed;
        inset: 0;
        display: grid;
        background: #050505;
      }
      iframe {
        border: 0;
        background: #fff;
      }
      .empty-state {
        display: grid;
        place-items: center;
        color: rgb(255 255 255 / 72%);
        font-size: 18px;
        font-weight: 700;
      }
      .nav-zone {
        position: fixed;
        top: 0;
        bottom: 0;
        z-index: 2;
        width: 42%;
        border: 0;
        background: transparent;
        cursor: pointer;
      }
      .nav-zone.previous { left: 0; }
      .nav-zone.next { right: 0; }
      .counter {
        position: fixed;
        left: 16px;
        bottom: 14px;
        z-index: 3;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgb(0 0 0 / 54%);
        color: #fff;
        font-size: 12px;
        opacity: 0;
        transition: opacity 160ms ease;
      }
      body:hover .counter { opacity: 1; }
    </style>
    <script type="module" src="./audience.js"></script>
  </head>
  <body>
    <main class="audience-stage" aria-label="TaDa! audience presentation">
      <div class="empty-state" id="emptyState">Waiting for presentation...</div>
      <iframe id="slideFrame" title="Audience slide" sandbox="allow-scripts allow-forms allow-modals" hidden></iframe>
      <button class="nav-zone previous" id="previousButton" type="button" aria-label="Previous slide"></button>
      <button class="nav-zone next" id="nextButton" type="button" aria-label="Next slide"></button>
      <div class="counter" id="counter">0 / 0</div>
    </main>
  </body>
</html>
